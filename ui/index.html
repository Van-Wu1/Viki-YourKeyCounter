<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KeyCounter Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand">KeyCounter</div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-page="dashboard">Dashboard</a>
        <a href="#" class="nav-item" data-page="preferences">Preferences</a>
      </nav>
      <div class="sidebar-footer">
        <span class="sidebar-credit">KeyCounter © 2026 · Van_Wu1</span>
      </div>
    </aside>

    <main class="main">
      <header class="header">
        <div class="header-title-row">
          <span class="header-title" id="headerTitle">Dashboard</span>
          <button type="button" class="header-refresh-btn" id="headerRefreshBtn" title="刷新数据" aria-label="刷新">
            <svg class="header-refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 4v6h-6M1 20v-6h6"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
          </button>
        </div>
        <span class="header-date" id="headerDate"></span>
      </header>

      <div id="page-dashboard" class="page">
      <section class="activity-section">
        <div class="activity-header">
          <div class="activity-title-block">
            <h3 class="activity-title">牛马积极性</h3>
            <div class="activity-total" id="activityTotal">0</div>
          </div>
          <div class="activity-tabs">
            <button type="button" class="activity-tab active" data-mode="all">All</button>
            <button type="button" class="activity-tab" data-mode="keys">Keys</button>
            <button type="button" class="activity-tab" data-mode="mouse">Mouse</button>
          </div>
        </div>
        <div class="activity-body">
          <div class="activity-tooltip" id="activityTooltip">
            <span class="activity-tooltip-date"></span>
            <span class="activity-tooltip-value"></span>
            <span class="activity-tooltip-arrow"></span>
          </div>
          <div class="activity-scroll-wrap" id="activityScrollWrap">
            <div class="activity-calendar">
              <div class="activity-month-row" id="activityMonthRow"></div>
              <div class="activity-grid-container">
                <div class="activity-day-labels" id="activityDayLabels"></div>
                <div id="activityGrid" class="activity-grid"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="activity-footer">
          <div class="activity-stats">
            <div class="activity-stat">
              <span class="activity-stat-label">最积极的月份</span>
              <span class="activity-stat-value" id="mostActiveMonth">-</span>
            </div>
            <div class="activity-stat">
              <span class="activity-stat-label">最积极的天</span>
              <span class="activity-stat-value" id="mostActiveDay">-</span>
            </div>
          </div>
          <div class="activity-legend">
            <span>Fewer</span>
            <span class="activity-legend-cell" data-level="0"></span>
            <span class="activity-legend-cell" data-level="1"></span>
            <span class="activity-legend-cell" data-level="2"></span>
            <span class="activity-legend-cell" data-level="3"></span>
            <span class="activity-legend-cell" data-level="4"></span>
            <span>More</span>
          </div>
        </div>
      </section>

      <section class="range-buttons">
        <button type="button" class="range-btn active" data-range="day">当日</button>
        <button type="button" class="range-btn" data-range="week">本周</button>
        <button type="button" class="range-btn" data-range="month">本月</button>
        <button type="button" class="range-btn" data-range="all" disabled>自定义</button>
      </section>

      <section class="panel panel-full">
        <h3 class="panel-title">键位排行 (Top 20)</h3>
        <div id="keyChart" class="chart chart-bar"></div>
      </section>

      <section class="panel panel-full">
        <h3 class="panel-title">鼠标明细</h3>
        <div id="mouseChart" class="chart chart-mouse"></div>
      </section>

      <section class="panel panel-chart">
        <div class="panel-title-row">
          <h3 class="panel-title">腱鞘炎趋势</h3>
          <div class="trend-btns">
            <button type="button" class="trend-btn active" data-trend="week">每周</button>
            <button type="button" class="trend-btn" data-trend="month">每月</button>
            <button type="button" class="trend-btn" data-trend="year">每年</button>
          </div>
        </div>
        <div id="chart" class="chart"></div>
      </section>
      </div>

      <div id="page-preferences" class="page" style="display:none;">
        <section class="panel panel-full prefs-panel">
          <div class="prefs-layout">
            <div class="prefs-left">
              <h3 class="panel-title">悬浮框设置</h3>
              <p class="prefs-placeholder">
                <span class="prefs-line1">前方的区域以后再来探索吧~</span><br>
                <span class="prefs-line2">（其实是作者卡在这里做不出来了嘻嘻）</span>
              </p>
              <div class="prefs-form">
            <div class="prefs-row">
              <label>宽度</label>
              <input type="number" id="prefWidth" min="100" max="400" step="10" disabled />
              <span class="prefs-unit">px</span>
            </div>
            <div class="prefs-row">
              <label>高度</label>
              <input type="number" id="prefHeight" min="50" max="200" step="5" disabled />
              <span class="prefs-unit">px</span>
            </div>
            <div class="prefs-row">
              <label>透明度</label>
              <input type="range" id="prefTransparency" min="30" max="100" disabled />
              <span class="prefs-value" id="prefTransparencyVal">94</span>
              <span class="prefs-unit">%</span>
            </div>
            <div class="prefs-row">
              <label>圆角</label>
              <input type="number" id="prefBorderRadius" min="0" max="30" step="2" disabled />
              <span class="prefs-unit">px</span>
            </div>
            <button type="button" class="prefs-save-btn" id="prefsSaveBtn" disabled>保存设置</button>
              </div>
            </div>
            <div class="prefs-donation">
              <p class="prefs-donation-text">！😋打赏作者更有力气😋！</p>
              <img src="moneycome.jpg" alt="打赏" class="prefs-donation-qr" />
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="main.js"></script>
</body>
</html>
