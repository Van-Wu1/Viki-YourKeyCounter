<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viki Widget Full Width Lightbar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@600&display=swap');

        body {
            /* 模拟明亮的桌面背景 */
            background: #f0f2f5;
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 20px 20px;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        /* 浅色半透明主体 */
        .viki-card {
            position: relative;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 16px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 24px;
            color: #1e293b;
            user-select: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            transition: all 0.3s ease;
            overflow: hidden; /* 确保灯带切角 */
        }

        .viki-card:hover {
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            transform: translateY(-1px);
        }

        /* 底部灯带容器 - 左右占满 */
        .light-bar-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px; /* 稍微加厚一点，更大气 */
            display: flex;
            gap: 2px; /* 极细间隙 */
        }

        /* 灯带单元 */
        .light-segment {
            flex: 1;
            height: 100%;
            background: rgba(0, 0, 0, 0.02);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 激活状态：下边框变色 + 弥散光晕 */
        .active-sedentary { 
            background: #ff5f5f; 
            box-shadow: 0 -2px 10px rgba(255, 95, 95, 0.4);
            animation: breathe 2.5s infinite ease-in-out;
        }
        .active-overuse { 
            background: #ffb020; 
            box-shadow: 0 -2px 10px rgba(255, 176, 32, 0.4);
            animation: breathe 2.5s infinite ease-in-out 0.5s;
        }
        .active-water { 
            background: #4dabff; 
            box-shadow: 0 -2px 10px rgba(77, 171, 255, 0.4);
            animation: breathe 2.5s infinite ease-in-out 1s;
        }

        @keyframes breathe {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* 文本与图标细节 */
        .brand-label {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 800;
            color: #94a3b8;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .stat-box {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-icon {
            font-size: 12px;
            color: #cbd5e1;
        }

        .stat-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 20px;
            font-weight: 600;
            color: #334155;
            letter-spacing: -0.5px;
        }

        .action-icon {
            font-size: 12px;
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-icon:hover {
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="viki-card">
        <!-- 品牌标识 -->
        <div class="brand-label">Viki</div>

        <!-- 键盘统计 -->
        <div class="stat-box">
            <i class="fa-solid fa-keyboard stat-icon"></i>
            <span class="stat-num">1,486</span>
        </div>

        <!-- 鼠标统计 -->
        <div class="stat-box">
            <i class="fa-solid fa-mouse-pointer stat-icon"></i>
            <span class="stat-num">1,263</span>
        </div>

        <!-- 设置（对冲平衡） -->
        <i class="fa-solid fa-gear action-icon"></i>

        <!-- 底部宽幅灯带 -->
        <div class="light-bar-container">
            <div class="light-segment active-sedentary"></div>
            <div class="light-segment active-overuse"></div>
            <div class="light-segment active-water"></div>
        </div>
    </div>

</body>
</html>
