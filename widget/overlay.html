<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>html,body{margin:0;padding:0;width:100%;height:100%;background:transparent;}</style>
</head>
<body>
<script>
(function(){
  var ipc=require('electron').ipcRenderer, sent=false;
  function close(){ if(!sent){ sent=true; ipc.send('overlay-clicked'); } }
  document.body.addEventListener('mousedown', close, { once: true });
  document.body.addEventListener('contextmenu', function(e){ e.preventDefault(); close(); }, { once: true });
})();
</script>
</body>
</html>
