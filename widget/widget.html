<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'">
  <title>Viki Widget</title>
  <link rel="stylesheet" href="widget.css">
</head>
<body>
  <div id="drag-area">
    <div class="health-header">
      <div class="health-dots">
        <span class="dot dot-sitting" id="dot-sitting" title="久坐提醒"></span>
        <span class="dot dot-tenosynovitis" id="dot-tenosynovitis" title="腱鞘炎提醒"></span>
        <span class="dot dot-water" id="dot-water" title="喝水提醒"></span>
      </div>
      <div class="title">Viki</div>
    </div>
    <div class="separator"></div>
    <div class="metrics">
      <div class="metric">
        <div class="label">KEYS</div>
        <div class="value" id="keys-value">0</div>
      </div>
      <div class="metric">
        <div class="label">MOUSE</div>
        <div class="value" id="mouse-value">0</div>
      </div>
    </div>
  </div>
  <script src="widget.js"></script>
</body>
</html>
