<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KeyCounter 登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    html, body { font-family: 'Inter', system-ui, sans-serif; margin: 0; padding: 0; }
    html { font-size: clamp(14px, 1.8vw, 16px); }
    .icon { width: 20px; height: 20px; flex-shrink: 0; }
    .icon-sm { width: 18px; height: 18px; }
    .icon-lg { width: 48px; height: 48px; }
    input:focus { outline: none; }
    .btn-drag { -webkit-app-region: drag; }
    .btn-no-drag { -webkit-app-region: no-drag; }
    .content-scroll { overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
    .content-scroll::-webkit-scrollbar { width: 6px; }
    .content-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body class="min-h-screen h-screen max-h-screen overflow-hidden bg-[#f8fafc] flex flex-col text-slate-600">
  <div class="h-8 min-h-[32px] flex-shrink-0 flex items-center justify-end px-1 bg-[#f8fafc] border-b border-slate-100 btn-drag">
    <button type="button" id="btn-minimize" class="btn-no-drag w-8 h-8 rounded hover:bg-slate-200 flex items-center justify-center text-slate-500">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"/></svg>
    </button>
    <button type="button" id="btn-close-win" class="btn-no-drag w-8 h-8 rounded hover:bg-red-100 flex items-center justify-center text-slate-500 hover:text-red-600">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="flex-1 min-h-0 flex justify-center items-start p-3 sm:p-4 content-scroll">
    <div id="app" class="w-full max-w-[400px] py-2">
    <div class="w-full h-1 bg-[#22c55e]/20 rounded-full mb-3 sm:mb-4 flex-shrink-0"></div>
    <!-- 登录 -->
    <div id="view-login" class="w-full bg-white rounded-2xl shadow-xl shadow-slate-200/50 p-5 sm:p-8 border border-slate-100">
      <div class="btn-drag mb-5 sm:mb-8">
        <div class="flex items-center gap-2 mb-2">
          <div class="w-8 h-8 bg-[#22c55e] rounded-lg flex items-center justify-center">
            <div class="w-4 h-4 bg-white rounded-sm rotate-45"></div>
          </div>
          <h1 class="text-2xl font-bold text-slate-800 tracking-tight">KeyCounter</h1>
        </div>
        <h2 class="text-xl font-semibold text-slate-700">欢迎回来</h2>
        <p class="text-sm text-slate-400 mt-1">登录后开始统计（Free: 仅本地 90 天 · Pro: 云同步）</p>
      </div>

      <form id="form-login" class="space-y-5 btn-no-drag">
        <div class="space-y-2">
          <label class="text-xs font-bold uppercase tracking-wider text-slate-400 ml-1">邮箱地址</label>
          <div class="relative group">
            <svg class="absolute left-3 top-3.5 icon text-slate-300 group-focus-within:text-[#22c55e] transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            <input type="email" id="login-email" required placeholder="name@example.com" class="w-full pl-11 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#22c55e]/20 focus:border-[#22c55e] transition-all placeholder:text-slate-300" />
          </div>
        </div>
        <div class="space-y-2">
          <div class="flex justify-between items-center">
            <label class="text-xs font-bold uppercase tracking-wider text-slate-400 ml-1">登录密码</label>
            <button type="button" id="btn-forgot" class="text-xs text-[#22c55e] hover:underline">忘记密码?</button>
          </div>
          <div class="relative group">
            <svg class="absolute left-3 top-3.5 icon text-slate-300 group-focus-within:text-[#22c55e] transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            <input type="password" id="login-password" required placeholder="请输入密码" class="w-full pl-11 pr-11 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#22c55e]/20 focus:border-[#22c55e] transition-all placeholder:text-slate-300" />
            <button type="button" id="toggle-pwd" class="absolute right-3 top-3 text-slate-300 hover:text-slate-500">
              <svg id="icon-eye" class="icon-sm" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              <svg id="icon-eye-off" class="icon-sm hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878a4.5 4.5 0 106.262 6.262M4 4l3 3m14-6l3 3M4 20l3-3m14 3l-3-3"/></svg>
            </button>
          </div>
        </div>
        <div class="flex items-center gap-2 ml-1">
          <input type="checkbox" id="remember" checked class="rounded border-slate-300 text-[#22c55e] focus:ring-[#22c55e]" />
          <label for="remember" class="text-sm text-slate-400 select-none">保持登录状态</label>
        </div>
        <div id="login-hint" class="text-sm text-red-500 min-h-[20px]"></div>
        <button type="submit" id="btn-login" class="w-full bg-[#334155] hover:bg-[#1e293b] text-white font-semibold py-3 rounded-xl shadow-lg shadow-slate-200 transition-all flex items-center justify-center gap-2 disabled:opacity-70">
          <span id="login-btn-text">立即登录</span>
          <svg id="login-btn-loader" class="w-5 h-5 hidden animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          <svg id="login-btn-arrow" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
        </button>
      </form>
      <div class="mt-8 pt-6 border-t border-slate-50 text-center btn-no-drag">
        <p class="text-sm text-slate-400">还没有账号？ <button type="button" id="go-register" class="text-[#22c55e] font-semibold ml-1 hover:underline">免费注册</button></p>
      </div>
    </div>

    <!-- 注册 -->
    <div id="view-register" class="w-full bg-white rounded-2xl shadow-xl shadow-slate-200/50 p-5 sm:p-8 border border-slate-100 hidden">
      <div class="btn-drag mb-5 sm:mb-8">
        <div class="flex items-center gap-2 mb-2">
          <div class="w-8 h-8 bg-[#22c55e] rounded-lg flex items-center justify-center"><div class="w-4 h-4 bg-white rounded-sm rotate-45"></div></div>
          <h1 class="text-2xl font-bold text-slate-800">KeyCounter</h1>
        </div>
        <h2 class="text-xl font-semibold text-slate-700">创建新账户</h2>
        <p class="text-sm text-slate-400 mt-1">加入 KeyCounter，跨设备同步你的"牛马积极性"</p>
      </div>
      <form id="form-register" class="space-y-4 btn-no-drag">
        <div class="space-y-1">
          <label class="text-xs font-bold text-slate-400 ml-1">用户昵称</label>
          <div class="relative group">
            <svg class="absolute left-3 top-3.5 icon text-slate-300 group-focus-within:text-[#22c55e] transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <input type="text" id="reg-nickname" required placeholder="怎么称呼您？" class="w-full pl-11 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#22c55e]/20 focus:border-[#22c55e] transition-all" />
          </div>
        </div>
        <div class="space-y-1">
          <label class="text-xs font-bold text-slate-400 ml-1">邮箱地址</label>
          <div class="relative group">
            <svg class="absolute left-3 top-3.5 icon text-slate-300 group-focus-within:text-[#22c55e] transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            <input type="email" id="reg-email" required placeholder="name@example.com" class="w-full pl-11 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#22c55e]/20 focus:border-[#22c55e] transition-all" />
          </div>
        </div>
        <div class="space-y-1">
          <label class="text-xs font-bold text-slate-400 ml-1">设置密码</label>
          <div class="relative group">
            <svg class="absolute left-3 top-3.5 icon text-slate-300 group-focus-within:text-[#22c55e] transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            <input type="password" id="reg-password" required minlength="6" placeholder="至少 6 位字符" class="w-full pl-11 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#22c55e]/20 focus:border-[#22c55e] transition-all" />
          </div>
        </div>
        <div class="p-4 bg-green-50 rounded-xl text-xs text-green-700 leading-relaxed">注册即视为同意我们的服务协议。新用户可享受 14 天 Pro 功能试用。</div>
        <div id="register-hint" class="text-sm text-red-500 min-h-[20px]"></div>
        <button type="submit" id="btn-register" class="w-full bg-[#22c55e] hover:bg-[#16a34a] text-white font-semibold py-3 rounded-xl shadow-lg shadow-green-100 transition-all flex items-center justify-center gap-2 disabled:opacity-70">
          <span id="register-btn-text">立即开启</span>
          <svg id="register-btn-loader" class="w-5 h-5 hidden animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        </button>
      </form>
      <div class="mt-8 pt-6 border-t border-slate-50 text-center btn-no-drag">
        <p class="text-sm text-slate-400">已有账号？ <button type="button" id="go-login" class="text-[#22c55e] font-semibold ml-1 hover:underline">返回登录</button></p>
      </div>
    </div>

    <!-- 忘记密码 -->
    <div id="view-forgot" class="w-full bg-white rounded-2xl shadow-xl shadow-slate-200/50 p-5 sm:p-8 border border-slate-100 hidden">
      <div class="btn-drag mb-5 sm:mb-8">
        <div class="flex items-center gap-2 mb-2">
          <div class="w-8 h-8 bg-[#22c55e] rounded-lg flex items-center justify-center"><div class="w-4 h-4 bg-white rounded-sm rotate-45"></div></div>
          <h1 class="text-2xl font-bold text-slate-800">KeyCounter</h1>
        </div>
        <h2 class="text-xl font-semibold text-slate-700">重置密码</h2>
        <p class="text-sm text-slate-400 mt-1">输入注册邮箱，我们将发送重置链接</p>
      </div>
      <form id="form-forgot" class="space-y-5 btn-no-drag">
        <div class="space-y-2">
          <label class="text-xs font-bold uppercase tracking-wider text-slate-400 ml-1">邮箱地址</label>
          <div class="relative group">
            <svg class="absolute left-3 top-3.5 icon text-slate-300 group-focus-within:text-[#22c55e] transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            <input type="email" id="forgot-email" required placeholder="name@example.com" class="w-full pl-11 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#22c55e]/20 focus:border-[#22c55e] transition-all" />
          </div>
        </div>
        <div id="forgot-hint" class="text-sm min-h-[20px]"></div>
        <div class="flex gap-2">
          <button type="submit" id="btn-forgot-submit" class="flex-1 bg-[#334155] hover:bg-[#1e293b] text-white font-semibold py-3 rounded-xl transition-all disabled:opacity-70">发送重置邮件</button>
          <button type="button" id="forgot-back" class="px-4 py-3 border border-slate-200 rounded-xl text-slate-500 hover:bg-slate-50">返回</button>
        </div>
      </form>
    </div>

    <!-- 欢迎 -->
    <div id="view-welcome" class="w-full bg-white rounded-3xl shadow-2xl shadow-green-100 p-6 sm:p-10 border border-green-50 text-center relative overflow-hidden hidden">
      <div class="absolute -top-12 -right-12 w-32 h-32 bg-green-50 rounded-full"></div>
      <div class="relative z-10">
        <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
          <svg class="icon-lg text-[#22c55e]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <h2 class="text-2xl font-bold text-slate-800 mb-2">登录成功！</h2>
        <p class="text-slate-400 mb-8 px-4">欢迎回来，<span id="welcome-name" class="text-slate-700 font-medium">-</span><br/>今天也是效率满满的一天呢。</p>
        <button type="button" id="btn-enter" class="w-full bg-[#334155] hover:bg-[#1e293b] text-white font-semibold py-3 rounded-xl transition-all shadow-lg shadow-slate-200">进入</button>
      </div>
    </div>

    <!-- 注册成功提示 -->
    <div id="view-reg-success" class="w-full bg-white rounded-2xl shadow-xl shadow-slate-200/50 p-5 sm:p-8 border border-slate-100 hidden">
      <div class="text-center">
        <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg class="w-10 h-10 text-[#22c55e]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        </div>
        <h2 class="text-xl font-bold text-slate-800 mb-2">验证邮件已发送</h2>
        <p class="text-slate-500 text-sm mb-6">请查收邮箱并点击验证链接，验证完成后返回登录。</p>
        <button type="button" id="reg-success-ok" class="w-full bg-[#334155] hover:bg-[#1e293b] text-white font-semibold py-3 rounded-xl">返回登录</button>
      </div>
    </div>

    <div class="mt-8 text-center">
      <p class="text-xs text-slate-300">KeyCounter © 2026 · Van_Wu1</p>
    </div>
  </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const API_PORT = params.get('port') || '55555';
    const API_BASE = 'http://localhost:' + API_PORT;

    function showView(id) {
      ['view-login','view-register','view-forgot','view-welcome','view-reg-success'].forEach(v => {
        const el = document.getElementById(v);
        if (el) el.classList.toggle('hidden', v !== id);
      });
    }

    function setLoading(btnId, loaderId, textId, loading) {
      const btn = document.getElementById(btnId);
      const loader = document.getElementById(loaderId);
      const text = document.getElementById(textId);
      if (btn) btn.disabled = loading;
      if (loader) loader.classList.toggle('hidden', !loading);
      if (text && textId === 'login-btn-text') text.classList.toggle('hidden', loading);
      if (text && textId === 'register-btn-text') text.classList.toggle('hidden', loading);
      const arrow = document.getElementById('login-btn-arrow');
      if (arrow) arrow.classList.toggle('hidden', loading);
    }

    document.getElementById('toggle-pwd').onclick = () => {
      const inp = document.getElementById('login-password');
      const eye = document.getElementById('icon-eye');
      const eyeOff = document.getElementById('icon-eye-off');
      if (inp.type === 'password') {
        inp.type = 'text';
        eye.classList.add('hidden');
        eyeOff.classList.remove('hidden');
      } else {
        inp.type = 'password';
        eye.classList.remove('hidden');
        eyeOff.classList.add('hidden');
      }
    };

    document.getElementById('go-register').onclick = () => showView('view-register');
    document.getElementById('go-login').onclick = () => showView('view-login');
    document.getElementById('btn-forgot').onclick = () => { document.getElementById('forgot-email').value = document.getElementById('login-email').value; showView('view-forgot'); };
    document.getElementById('forgot-back').onclick = () => showView('view-login');
    document.getElementById('reg-success-ok').onclick = () => showView('view-login');

    document.getElementById('btn-minimize').onclick = () => { try { require('electron').ipcRenderer.send('login-minimize'); } catch(e) {} };
    document.getElementById('btn-close-win').onclick = () => { try { require('electron').ipcRenderer.send('login-cancel'); } catch(e) { window.close(); } };

    document.getElementById('form-login').onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const hint = document.getElementById('login-hint');
      hint.textContent = '';
      setLoading('btn-login','login-btn-loader','login-btn-text', true);
      try {
        const res = await fetch(API_BASE + '/api/cloud/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, deviceName: 'This Device' })
        });
        const json = await res.json();
        if (res.ok && json.ok) {
          const displayName = json.user?.displayName || json.user?.user_metadata?.display_name || json.user?.email || email;
          document.getElementById('welcome-name').textContent = displayName;
          showView('view-welcome');
        } else {
          if (json.error === 'invalid_credentials') {
            const msg = json.details || '邮箱或密码错误';
            if (msg.includes('Email') || msg.includes('email') || msg.includes('confirm')) {
              hint.textContent = '请先验证邮箱后再登录。';
            } else {
              hint.textContent = '邮箱或密码错误。';
            }
          } else if (json.error === 'cloud_not_configured') {
            hint.textContent = '云未配置，请检查 .env。';
          } else {
            hint.textContent = json.error || '登录失败';
          }
        }
      } catch (err) {
        hint.textContent = '无法连接 API，请确认 KeyCounter 已启动。';
      } finally {
        setLoading('btn-login','login-btn-loader','login-btn-text', false);
      }
    };

    document.getElementById('form-register').onsubmit = async (e) => {
      e.preventDefault();
      const nickname = document.getElementById('reg-nickname').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const hint = document.getElementById('register-hint');
      hint.textContent = '';
      setLoading('btn-register','register-btn-loader','register-btn-text', true);
      try {
        const res = await fetch(API_BASE + '/api/cloud/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, displayName: nickname })
        });
        const json = await res.json();
        if (res.ok && json.ok) {
          showView('view-reg-success');
        } else {
          hint.textContent = json.error || json.message || '注册失败';
        }
      } catch (err) {
        hint.textContent = '无法连接 API，请确认 KeyCounter 已启动。';
      } finally {
        setLoading('btn-register','register-btn-loader','register-btn-text', false);
      }
    };

    document.getElementById('form-forgot').onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('forgot-email').value.trim();
      const hint = document.getElementById('forgot-hint');
      hint.textContent = '';
      hint.classList.remove('text-red-500','text-green-600');
      document.getElementById('btn-forgot-submit').disabled = true;
      try {
        const res = await fetch(API_BASE + '/api/cloud/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const json = await res.json();
        if (res.ok && json.ok) {
          hint.classList.add('text-green-600');
          hint.textContent = '重置邮件已发送，请查收。';
        } else {
          hint.classList.add('text-red-500');
          hint.textContent = json.error || json.message || '发送失败';
        }
      } catch (err) {
        hint.classList.add('text-red-500');
        hint.textContent = '无法连接 API。';
      } finally {
        document.getElementById('btn-forgot-submit').disabled = false;
      }
    };

    document.getElementById('btn-enter').onclick = () => {
      try { require('electron').ipcRenderer.send('login-success'); } catch(e) { window.close(); }
    };
  </script>
</body>
</html>
